<!-- ID Card Modal Component -->
<div class="modal fade" id="idCardModal" tabindex="-1" aria-labelledby="idCardModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 bg-transparent shadow-none" style="pointer-events: none;">
      
      <div class="modal-body d-flex justify-content-center align-items-center" style="pointer-events: auto;">
        
        <!-- Flip Container -->
        <div class="id-card-flip-container" onclick="this.classList.toggle('flipped')">
            <div class="id-card-flipper">
                
                <!-- Front Side -->
                <div class="id-card-front card border-0 rounded-4 overflow-hidden" style="background-color: #1565c0; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                    
                    <!-- Top Header (Light Blue) -->
                    <div class="d-flex justify-content-between align-items-center px-3 py-3" style="background-color: #2563eb;">
                        <h4 class="text-white mb-0 fw-bold" style="letter-spacing: 0.5px;">SwimTrackPro</h4>
                        <div class="bg-white rounded-circle d-flex justify-content-center align-items-center" style="width: 32px; height: 32px;">
                            <i class="fa-solid fa-water" style="color: #2563eb;"></i>
                        </div>
                    </div>
                    
                    <!-- Middle Body (Dark Blue) -->
                    <div class="px-3 py-4 d-flex justify-content-between position-relative">
                        <!-- Left Details -->
                        <div class="text-white d-flex flex-column" style="width: 55%; z-index: 2;">
                            <h4 id="idCardName" class="fw-bold mb-2 text-white" style="font-size: 1.3rem; line-height: 1.2;">Name</h4>
                            
                            <div class="mb-3">
                                <small class="d-block text-white-50" style="font-size: 0.7rem;">Title</small>
                                <span id="idCardTitle" class="fw-semibold text-white" style="font-size: 0.9rem;">...</span>
                            </div>
                            
                            <div class="mb-3">
                                <small class="d-block text-white-50" style="font-size: 0.7rem;">ID Number</small>
                                <span id="idCardNumber" class="fw-semibold text-white" style="font-size: 0.9rem;">STP0000</span>
                            </div>
                            
                            <div class="mt-auto">
                                <small class="d-block text-white-50" style="font-size: 0.7rem;">Phone</small>
                                <span id="idCardPhoneFront" class="fw-semibold text-white" style="font-size: 0.9rem; word-break: break-all;">...</span>
                            </div>
                        </div>
                        
                        <!-- Right Photo & Role -->
                        <div class="d-flex flex-column align-items-end" style="width: 40%; z-index: 2;">
                            <div class="bg-white p-1 shadow-sm w-100" style="aspect-ratio: 3/4;">
                                <img id="idCardPhoto" src="" alt="Photo" class="w-100 h-100" style="object-fit: cover;">
                            </div>
                            
                            <div class="bg-white text-center w-100 mt-2 py-1 shadow-sm rounded-1">
                                <strong id="idCardRoleBadge" class="text-dark fw-bolder d-block" style="font-size: 0.8rem; letter-spacing: 0.5px;">ROLE</strong>
                                <div id="idCardSignature" class="text-dark mt-1 px-1 text-truncate" style="font-family: 'Brush Script MT', 'Lucida Handwriting', cursive; font-size: 1.1rem; line-height: 1.2; color: #333;">Signature</div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Bottom QR Section (Light Blue) -->
                    <div class="flex-grow-1 d-flex position-relative justify-content-center align-items-center py-3" style="background-color: #2563eb;">
                        <!-- Rotated Timestamp -->
                        <div class="position-absolute text-white" style="left: 12px; top: 50%; transform: translateY(-50%) rotate(-90deg); transform-origin: left center; font-size: 0.65rem; white-space: nowrap; opacity: 0.9;">
                            <span id="idCardTimestamp"></span>
                        </div>
                        
                        <!-- QR Code -->
                        <div class="bg-white p-2 shadow-sm rounded-2 z-1">
                            <img id="idCardQRFront" src="" alt="QR" style="width: 110px; height: 110px;">
                        </div>
                        
                        <!-- Corner Logo -->
                        <div class="position-absolute" style="bottom: 12px; left: 12px;">
                            <div class="rounded-pill px-2 py-1 shadow d-flex justify-content-center align-items-center" style="background: linear-gradient(135deg, #ffc107, #ff9800); width: 35px; height: 35px;">
                                <strong class="text-dark" style="font-size: 1rem; line-height: 1;">iD</strong>
                            </div>
                        </div>
                        
                        <!-- Dropdown Hint -->
                        <div class="position-absolute w-100 text-center" style="bottom: 5px;">
                            <small class="text-white-50" style="font-size: 0.65rem;">Tap for Contact Info <i class="fa-solid fa-rotate ms-1"></i></small>
                        </div>
                    </div>
                </div>
                
                <!-- Back Side -->
                <div class="id-card-back card border-0 rounded-4 overflow-hidden" style="background-color: #f8f9fa; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                    <div class="d-flex justify-content-between align-items-center px-3 py-3" style="background-color: #2563eb;">
                        <h4 class="text-white mb-0 fw-bold" style="letter-spacing: 0.5px;">Contact Info</h4>
                        <i class="fa-solid fa-address-card text-white-50 fs-5"></i>
                    </div>
                    
                    <div class="card-body d-flex flex-column p-4">
                        <div class="mb-4">
                            <div class="d-flex align-items-center gap-3 mb-4">
                                <div class="rounded-circle d-flex justify-content-center align-items-center shadow-sm" style="width: 40px; height: 40px; background-color: #e2e8f0; color: #1565c0;">
                                    <i class="fa-solid fa-phone fs-5"></i>
                                </div>
                                <div class="flex-grow-1 overflow-hidden">
                                    <small class="text-muted d-block fw-semibold" style="font-size: 0.75rem;">Phone Number</small>
                                    <strong id="idCardPhone" class="text-dark fs-6 d-block text-truncate">Not provided</strong>
                                </div>
                            </div>
                            
                            <div class="d-flex align-items-center gap-3 mb-4">
                                <div class="rounded-circle d-flex justify-content-center align-items-center shadow-sm" style="width: 40px; height: 40px; background-color: #e2e8f0; color: #1565c0;">
                                    <i class="fa-solid fa-envelope fs-5"></i>
                                </div>
                                <div class="flex-grow-1 overflow-hidden">
                                    <small class="text-muted d-block fw-semibold" style="font-size: 0.75rem;">Email Address</small>
                                    <strong id="idCardEmail" class="text-dark fs-6 d-block text-truncate">Not provided</strong>
                                </div>
                            </div>
                            
                            <div class="d-flex align-items-center gap-3">
                                <div class="rounded-circle d-flex justify-content-center align-items-center shadow-sm flex-shrink-0" style="width: 40px; height: 40px; background-color: #e2e8f0; color: #1565c0;">
                                    <i class="fa-solid fa-map-location-dot fs-5"></i>
                                </div>
                                <div class="flex-grow-1 overflow-hidden">
                                    <small class="text-muted d-block fw-semibold" style="font-size: 0.75rem;">Residential Address</small>
                                    <strong id="idCardAddress" class="text-dark fs-6 d-block" style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; white-space: normal; line-height: 1.3;">Not provided</strong>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mt-auto text-center border-top pt-3">
                            <p class="text-muted mb-0" style="font-size: 0.7rem;">This card is property of SwimTrackPro.</p>
                            <p class="text-muted mb-0" style="font-size: 0.7rem;">If found, please return to administration.</p>
                            <small class="text-primary mt-2 d-inline-block" style="font-size: 0.7rem; cursor: pointer;"><i class="fa-solid fa-rotate ms-1"></i> Tap to flip back</small>
                        </div>
                    </div>
                </div>
                
            </div>
        </div>
        
      </div>
      
      <!-- Close button below card -->
      <div class="text-center pb-4" style="pointer-events: auto;">
          <button type="button" class="btn btn-light rounded-circle shadow" data-bs-dismiss="modal" style="width: 48px; height: 48px; opacity: 0.9;">
              <i class="fa-solid fa-xmark fs-5 text-dark"></i>
          </button>
      </div>

    </div>
  </div>
</div>

<style>
/* ID Card Flip Animation */
.id-card-flip-container {
    perspective: 1000px;
    width: 320px;
    height: 520px;
    cursor: pointer;
}
.id-card-flip-container.flipped .id-card-flipper {
    transform: rotateY(180deg);
}
.id-card-flipper {
    transition: 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
    transform-style: preserve-3d;
    position: relative;
    width: 100%;
    height: 100%;
}
.id-card-front, .id-card-back {
    backface-visibility: hidden;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
}
.id-card-front {
    z-index: 2;
    transform: rotateY(0deg);
}
.id-card-back {
    transform: rotateY(180deg);
}
#idCardModal .modal-backdrop {
    background-color: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
}
</style>

<script>
function showMyIdCard() {
    // Show loading state
    document.getElementById('idCardName').innerText = 'Loading...';
    document.getElementById('idCardTitle').innerText = '...';
    document.getElementById('idCardNumber').innerText = '...';
    document.getElementById('idCardPhoneFront').innerText = '...';
    document.getElementById('idCardPhone').innerText = '...';
    document.getElementById('idCardEmail').innerText = '...';
    document.getElementById('idCardAddress').innerText = '...';
    document.getElementById('idCardSignature').innerText = '...';
    
    // Set timestamp
    const now = new Date();
    document.getElementById('idCardTimestamp').innerText = now.toLocaleString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit'
    });
    
    const flipContainer = document.querySelector('.id-card-flip-container');
    if (flipContainer) flipContainer.classList.remove('flipped');
    
    fetch('/api/my_id_card')
        .then(response => response.json())
        .then(data => {
            if (data.error) {
                alert("Please log in to view your ID card.");
                return;
            }
            
            const name = data.name || 'Unknown';
            document.getElementById('idCardName').innerText = name;
            
            // Generate a simple first initial + last name for signature if there's space
            let signatureName = name;
            const nameParts = name.split(' ');
            if (nameParts.length > 1) {
                signatureName = nameParts[0].charAt(0) + '. ' + nameParts.slice(1).join(' ');
            }
            document.getElementById('idCardSignature').innerText = signatureName;
            
            // Format title
            let title = data.title || 'Member';
            title = title.replace('SwimTrackPro ', '');
            document.getElementById('idCardTitle').innerText = title;
            
            // Role badge from ID number
            const idNum = data.id_number || 'STP0000';
            document.getElementById('idCardNumber').innerText = idNum;
            
            let badgeText = 'MEMBER';
            if (idNum.includes('STPC')) badgeText = 'COACH';
            else if (idNum.includes('STPA')) badgeText = 'ADMIN';
            else if (idNum.includes('STPS')) badgeText = 'STUDENT';
            document.getElementById('idCardRoleBadge').innerText = badgeText;
            
            document.getElementById('idCardPhoneFront').innerText = data.phone || 'N/A';
            document.getElementById('idCardPhone').innerText = data.phone || 'Not provided';
            document.getElementById('idCardEmail').innerText = data.email || 'Not provided';
            document.getElementById('idCardAddress').innerText = data.address || 'Not provided';
            
            if (data.photo) {
                document.getElementById('idCardPhoto').src = data.photo;
            }
            
            // QR Code API
            document.getElementById('idCardQRFront').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=SwimTrackProID:${idNum}`;
            
            const idModal = new bootstrap.Modal(document.getElementById('idCardModal'));
            idModal.show();
        })
        .catch(error => {
            console.error('Error fetching ID card details:', error);
            alert("Could not load ID card details at this time.");
        });
}
</script>

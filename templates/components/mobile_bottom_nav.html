{% set session_role = session.get('role', 'guest') %}
{# active_page should be one of: home, bookings, calendar, payments, book, contact, about, profile #}

<div class="mobile-bottom-nav d-lg-none" role="navigation" aria-label="Mobile navigation">

  {% if session_role == 'trainer' %}

  <button type="button" class="mobile-nav-item {% if active_page == 'home' %}active{% endif %}" onclick="window.location.href='/'">
    <i class="fa-solid fa-house"></i>
    <small>Home</small>
  </button>

  <button type="button" class="mobile-nav-item {% if active_page == 'bookings' %}active{% endif %}" onclick="window.location.href='/my-bookings'">
    <i class="fa-solid fa-clipboard-list"></i>
    <small>Bookings</small>
  </button>

  <button type="button" class="mobile-nav-item {% if active_page == 'calendar' %}active{% endif %}" onclick="window.location.href='/calendar'">
    <i class="fa-solid fa-calendar-days"></i>
    <small>Calendar</small>
  </button>

  <button type="button" class="mobile-nav-item {% if active_page == 'payments' %}active{% endif %}" onclick="window.location.href='/payments'">
    <i class="fa-solid fa-credit-card"></i>
    <small>Payments</small>
  </button>

  <button type="button" class="mobile-nav-item {% if active_page == 'profile' %}active{% endif %}" onclick="window.location.href='/profile'">
    <i class="fa-solid fa-circle-user"></i>
    <small>Profile</small>
  </button>

  {% else %}

  <button type="button" class="mobile-nav-item {% if active_page == 'home' %}active{% endif %}" onclick="window.location.href='/'">
    <i class="fa-solid fa-house"></i>
    <small>Home</small>
  </button>

  <button type="button" class="mobile-nav-item {% if active_page == 'book' %}active{% endif %}" onclick="window.location.href='/booking'">
    <i class="fa-solid fa-calendar-plus"></i>
    <small>Book</small>
  </button>

  <button type="button" class="mobile-nav-item {% if active_page == 'bookings' %}active{% endif %}" onclick="window.location.href='/my-bookings'">
    <i class="fa-solid fa-clipboard-list"></i>
    <small>Bookings</small>
  </button>

  <button type="button" class="mobile-nav-item {% if active_page == 'calendar' %}active{% endif %}" onclick="window.location.href='/calendar'">
    <i class="fa-solid fa-calendar-days"></i>
    <small>Calendar</small>
  </button>

  <button type="button" class="mobile-nav-item {% if active_page == 'contact' %}active{% endif %}" onclick="window.location.href='/help'">
    <i class="fa-solid fa-headset"></i>
    <small>Contact</small>
  </button>

  {% endif %}

</div>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>SwimTrackPro | Coach Registration</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: linear-gradient(rgba(255, 255, 255, 0.38), rgba(255, 255, 255, 0.38)), url("../static/images/myswimpro-butterfly-login.jpg");
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            overflow-y: auto;
            padding: 30px 15px;
        }

        .register-card {
            width: 100%;
            max-width: 650px;
            background: rgba(255, 255, 255, 0.88);
            border-radius: 26px;
            padding: 40px 35px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.45);
            margin: auto;
        }

        .logo-icon {
            font-size: 36px;
            text-align: center;
            color: #2563eb;
            margin-bottom: 2px;
        }

        .register-title {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 700;
            color: #2563eb;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .register-subtitle {
            text-align: center;
            color: #6b7280;
            font-size: 0.98rem;
            margin-bottom: 30px;
            font-weight: 400;
        }

        .form-label {
            font-weight: 700;
            font-size: 0.9rem;
            color: #374151;
            margin-bottom: 6px;
        }

        .section-header {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1e3a8a;
            border-bottom: 2px solid rgba(37, 99, 235, 0.15);
            padding-bottom: 6px;
            margin-bottom: 18px;
            margin-top: 10px;
        }

        .input-group {
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid rgba(209, 213, 219, 0.80);
            background: rgba(255, 255, 255, 0.92);
        }

        .form-control,
        .input-group-text {
            height: 48px;
            border: none !important;
            font-size: 0.95rem;
            background: transparent;
        }

        .input-group-text {
            padding: 0 16px;
            color: #9ca3af;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
        }

        .form-control {
            padding-left: 6px;
            color: #111827;
            box-shadow: none !important;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #2563eb;
        }

        .register-btn {
            width: 100%;
            height: 52px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(90deg, #2563eb, #1d4ed8);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            margin-top: 15px;
            transition: 0.2s ease;
            box-shadow: 0 6px 18px rgba(37,99,235,0.18);
        }

        .register-btn:hover {
            transform: translateY(-1px);
            opacity: 0.95;
        }

        .footer-text {
            text-align: center;
            margin-top: 18px;
            color: #6b7280;
            font-size: 0.85rem;
        }

        .form-check-label {
            font-size: 0.85rem;
            color: #4b5563;
            font-weight: 500;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="register-card shadow">
            <div class="logo-icon"><i class="fa-solid fa-swimming-pool"></i></div>
            <h1 class="register-title">Coach Registration</h1>
            <p class="register-subtitle">Join us to train and inspire the next wave of swimmers.</p>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="alert alert-danger py-2 px-3 small border-0 mb-4" style="border-radius: 12px;">
                        <i class="fa-solid fa-triangle-exclamation"></i> {{ messages[-1] }}
                    </div>
                {% endif %}
            {% endwith %}

            <form action="/register_trainer" method="post" id="registrationForm">
                <!-- Section 1: Account Information -->
                <div class="section-header"><i class="fa-solid fa-user-gear me-2"></i> Account Details</div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label" for="fullnameInput">Full Name <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-address-card"></i></span>
                            <input
                                type="text"
                                name="name"
                                id="fullnameInput"
                                class="form-control"
                                placeholder="Enter full name"
                                maxlength="100"
                                required
                            >
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label" for="usernameInput">Username <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                            <input
                                type="text"
                                name="username"
                                id="usernameInput"
                                class="form-control"
                                placeholder="Choose username"
                                maxlength="50"
                                required
                            >
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label" for="passwordInput">Password <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                            <input
                                type="password"
                                name="password"
                                id="passwordInput"
                                class="form-control"
                                placeholder="Create password"
                                required
                            >
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label" for="emailInput">Email Address <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                            <input
                                type="email"
                                name="email"
                                id="emailInput"
                                class="form-control"
                                placeholder="e.g. coach@example.com"
                                required
                            >
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label" for="phoneInput">Mobile Number <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-phone"></i></span>
                            <input
                                type="tel"
                                name="phone"
                                id="phoneInput"
                                class="form-control"
                                placeholder="Enter 10-digit mobile"
                                maxlength="10"
                                pattern="[0-9]{10}"
                                inputmode="numeric"
                                required
                            >
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label" for="whatsappInput">WhatsApp Number <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-brands fa-whatsapp text-success"></i></span>
                            <input
                                type="tel"
                                name="whatsapp"
                                id="whatsappInput"
                                class="form-control"
                                placeholder="Enter 10-digit WhatsApp number"
                                maxlength="10"
                                pattern="[0-9]{10}"
                                inputmode="numeric"
                                required
                            >
                        </div>
                    </div>
                </div>

                <!-- Section 2: Professional Profile -->
                <div class="section-header"><i class="fa-solid fa-award me-2"></i> Professional Profile</div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label" for="experienceInput">Years of Experience <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-hourglass-half"></i></span>
                            <input
                                type="text"
                                name="experience"
                                id="experienceInput"
                                class="form-control"
                                placeholder="e.g. 5 Years"
                                required
                            >
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label" for="qualificationInput">Qualifications / Certifications <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-graduation-cap"></i></span>
                            <input
                                type="text"
                                name="qualification"
                                id="qualificationInput"
                                class="form-control"
                                placeholder="e.g. Certified Swim Coach"
                                required
                            >
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Currently Working? <span class="text-danger">*</span></label>
                        <div class="d-flex align-items-center gap-4 mt-2">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="is_working" id="workingYes" value="Yes" required>
                                <label class="form-check-label" for="workingYes">
                                    Yes
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="is_working" id="workingNo" value="No" required>
                                <label class="form-check-label" for="workingNo">
                                    No
                                </label>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3" id="workingInputContainer" style="display: none;">
                        <label class="form-label" for="workingInput">Currently Working At <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-building"></i></span>
                            <input
                                type="text"
                                name="currently_working"
                                id="workingInput"
                                class="form-control"
                                placeholder="e.g. SwimTrackPro Academy / Self Employed"
                            >
                        </div>
                    </div>
                </div>

                <!-- Section 3: Verification & Residence -->
                <div class="section-header"><i class="fa-solid fa-id-card me-2"></i> Location & Verification</div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label" for="residenceInput">Location of Residence <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-location-dot"></i></span>
                            <input
                                type="text"
                                name="residence_location"
                                id="residenceInput"
                                class="form-control"
                                placeholder="e.g. Indiranagar, Bangalore"
                                required
                            >
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label" for="idproofInput">ID Proof Number <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-passport"></i></span>
                            <input
                                type="text"
                                name="id_proof"
                                id="idproofInput"
                                class="form-control"
                                placeholder="e.g. Aadhaar / Passport Number"
                                required
                            >
                        </div>
                    </div>
                </div>

                <!-- Section 4: Consent check -->
                <div class="mb-4 mt-3">
                    <div class="form-check text-start">
                        <input
                            type="checkbox"
                            class="form-check-input"
                            id="consentInput"
                            name="consent_accepted"
                            required
                        >
                        <label class="form-check-label text-muted" for="consentInput" style="font-size: 0.85rem;">
                            I have read, understood, and voluntarily agree to the <a href="/terms-agreement" target="_blank" class="text-primary fw-bold text-decoration-none">SwimTrackPro Coach Terms & Agreement</a>, including my responsibilities for professionalism, safety, ethics, accountability, and compliance with platform policies.
                        </label>
                    </div>
                </div>

                <button type="submit" class="register-btn">
                    Register as Coach
                </button>

                <div class="footer-text mt-3">
                    Already registered? <a href="/" class="text-primary fw-bold text-decoration-none">Login Here</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        const phoneInput = document.getElementById('phoneInput');
        if (phoneInput) {
            phoneInput.addEventListener('input', () => {
                phoneInput.value = phoneInput.value.replace(/\D/g, '').slice(0, 10);
            });
        }

        const whatsappInput = document.getElementById('whatsappInput');
        if (whatsappInput) {
            whatsappInput.addEventListener('input', () => {
                whatsappInput.value = whatsappInput.value.replace(/\D/g, '').slice(0, 10);
            });
        }

        const registrationForm = document.getElementById('registrationForm');
        if (registrationForm) {
            registrationForm.addEventListener('submit', (e) => {
                const consentInput = document.getElementById('consentInput');
                if (!consentInput.checked) {
                    e.preventDefault();
                    alert("You must accept the Coach Terms & Agreement to register.");
                }
            });
        }

        // Toggle Currently Working At input field conditionally
        const workingYes = document.getElementById('workingYes');
        const workingNo = document.getElementById('workingNo');
        const workingInputContainer = document.getElementById('workingInputContainer');
        const workingInput = document.getElementById('workingInput');

        function toggleWorkingInput() {
            if (workingYes && workingYes.checked) {
                if (workingInputContainer) workingInputContainer.style.display = 'block';
                if (workingInput) workingInput.required = true;
            } else {
                if (workingInputContainer) workingInputContainer.style.display = 'none';
                if (workingInput) {
                    workingInput.required = false;
                    workingInput.value = '';
                }
            }
        }

        if (workingYes && workingNo) {
            workingYes.addEventListener('change', toggleWorkingInput);
            workingNo.addEventListener('change', toggleWorkingInput);
        }
    </script>
</body>
</html>

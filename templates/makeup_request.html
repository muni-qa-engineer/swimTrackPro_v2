<!DOCTYPE html>
<html>
<head>
    <title>Make-Up Request</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }
        .container {
            max-width: 600px;
            margin: auto;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }
        select,
        input,
        button {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            box-sizing: border-box;
        }
        button {
            margin-top: 20px;
            cursor: pointer;
        }
        .back-link {
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2><i class="fa-solid fa-rotate"></i> Make-Up Request</h2>

    <p><strong>Swimmer:</strong> {{ student_name }}</p>

    <form method="POST" action="{{ url_for('submit_makeup_request') }}">
        <input type="hidden" name="booking_id" value="{{ booking_id }}">

        <label for="credit_id">Select Skipped Session</label>
        <select id="credit_id" name="credit_id" required>
            {% for credit in credits %}
            <option value="{{ credit.id }}">
                {{ credit.original_date }}
            </option>
            {% endfor %}
        </select>

        <label for="requested_date">Select Replacement Date</label>
        <input id="requested_date"
               type="date"
               name="requested_date"
               required>

        <button type="submit">Submit Request</button>
    </form>

    <p class="back-link">
        <a href="{{ url_for('index') }}">← Back to Dashboard</a>
    </p>
</div>
</body>
</html>

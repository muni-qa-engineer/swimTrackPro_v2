<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>SwimTrack Login</title>
    <style>
        body { background: linear-gradient(135deg, #6fb1fc, #4364f7); height: 100vh; display: flex; align-items: center; }
        .login-card { border-radius: 20px; padding: 2rem; background: white; width: 100%; max-width: 400px; margin: auto; }
        input::placeholder {
            color: rgba(107, 114, 128, 0.45) !important;
            opacity: 1 !important;
            font-weight: 400;
        }

        .form-control {
            color: #1f2937;
        }
        .active-mode {
            background-color: #0d6efd !important;
            color: white !important;
            border: none;
        }
        .mode-btn {
            border-radius: 12px;
            font-weight: 600;
            padding: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card shadow">
            <h3 class="text-center mb-4">🏊‍♂️ SwimTrack Pro</h3>
            <div class="d-flex gap-2 mb-4">
                <button type="button" id="guestBtn" class="btn btn-outline-primary flex-fill mode-btn active-mode">
                    Guest
                </button>

                <button type="button" id="adminBtn" class="btn btn-outline-dark flex-fill mode-btn">
                    Admin
                </button>
            </div>

            <form action="/login" method="post" id="loginForm">
                <input type="hidden" name="role" id="roleInput" value="guest">

                <div class="mb-3">
                    <input type="text" name="name" class="form-control form-control-lg" placeholder="Enter your name" required>
                </div>

                <div class="mb-3 d-none" id="passwordField">
                    <input
                        type="password"
                        name="password"
                        id="passwordInput"
                        class="form-control form-control-lg"
                        placeholder="Enter admin password"
                    >
                </div>

                <div class="mb-3" id="phoneField">
                    <!-- <label class="form-label fw-semibold mb-2">Phone Number</label> -->

                    <div class="input-group input-group-lg">
                        <span class="input-group-text bg-white border-end-0">
                            🇮🇳 +91
                        </span>

                        <input
                            type="tel"
                            id="phoneInput"
                            name="phone"
                            class="form-control border-start-0"
                            placeholder="Enter 10-digit number"
                            maxlength="10"
                            pattern="[0-9]{10}"
                            inputmode="numeric"
                            required
                        >
                    </div>

                    <small id="phoneError" class="text-danger d-none">
                        Please enter valid 10-digit mobile number
                    </small>
                </div>

                <button type="submit" class="btn btn-primary w-100 btn-lg">Login</button>
            </form>
        </div>
    </div>
<script>
    const phoneInput = document.getElementById('phoneInput');
    const phoneError = document.getElementById('phoneError');
    const loginForm = document.getElementById('loginForm');
    const guestBtn = document.getElementById('guestBtn');
    const adminBtn = document.getElementById('adminBtn');
    const roleInput = document.getElementById('roleInput');
    const phoneField = document.getElementById('phoneField');
    const passwordField = document.getElementById('passwordField');
    const passwordInput = document.getElementById('passwordInput');

    function activateGuestMode() {
        roleInput.value = 'guest';

        guestBtn.classList.add('active-mode');
        adminBtn.classList.remove('active-mode');

        phoneField.classList.remove('d-none');
        passwordField.classList.add('d-none');

        phoneInput.required = true;
        passwordInput.required = false;
    }

    function activateAdminMode() {
        roleInput.value = 'admin';

        adminBtn.classList.add('active-mode');
        guestBtn.classList.remove('active-mode');

        phoneField.classList.add('d-none');
        passwordField.classList.remove('d-none');

        phoneInput.required = false;
        passwordInput.required = true;
    }

    if (guestBtn) {
        guestBtn.addEventListener('click', activateGuestMode);
    }

    if (adminBtn) {
        adminBtn.addEventListener('click', activateAdminMode);
    }

    if (phoneInput) {
    phoneInput.addEventListener('input', () => {
        phoneInput.value = phoneInput.value.replace(/\D/g, '').slice(0, 10);

        if (phoneInput.value.length === 10) {
            phoneError.classList.add('d-none');
            phoneInput.classList.remove('is-invalid');
        }
    });
}

if (loginForm) {
    loginForm.addEventListener('submit', (e) => {

        if (roleInput.value === 'guest') {
            const phone = phoneInput.value.trim();

            if (!/^\d{10}$/.test(phone)) {
                e.preventDefault();
                phoneError.classList.remove('d-none');
                phoneInput.classList.add('is-invalid');
            }
        }
    });
}
</script>
</body>
</html>

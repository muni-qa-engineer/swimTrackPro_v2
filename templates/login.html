<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta property="og:title" content="SwimTrackPro">
    <meta property="og:description" content="Book Sessions, Track Progress and Simplify Swim Management">
    <meta property="og:image" content="https://swimtrackpro.onrender.com/static/images/og-banner.jpg">
    <meta property="og:url" content="https://swimtrackpro.onrender.com">
    <meta property="og:type" content="website">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="SwimTrackPro">
    <meta name="twitter:description" content="Book Sessions, Track Progress and Simplify Swim Management">
    <meta name="twitter:image" content="https://swimtrackpro.onrender.com/static/images/og-banner.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>SwimTrackPro | Book • Train • Track</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* background:
                linear-gradient(rgba(255,255,255,0.38), rgba(255,255,255,0.38)),
                url("{{ url_for('static', filename='images/swim-login-bg.jpg') }}") center center / cover no-repeat;
            background-size: cover;
            background-position: center; */
            background-image: linear-gradient(rgba(255,255,255,0.38), rgba(255,255,255,0.38)), url("../static/images/myswimpro-butterfly-login.jpg");
            background-repeat: no-repeat; /* Prevents tiling */
            background-size: cover;      /* Scales image to fill container */
            background-position: center;
            /* opacity: 0.5;  */
            overflow-y: auto;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 460px;
            background: rgba(255,255,255,0.82);
            border-radius: 26px;
            padding: 34px 30px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.10);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.40);
            margin: auto;
        }

        .logo-icon {
            font-size: 34px;
            text-align: center;
            color: #2563eb;
            margin-bottom: 2px;
        }

        .login-title {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 700;
            color: #2563eb;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .login-subtitle {
            text-align: center;
            color: #6b7280;
            font-size: 0.98rem;
            margin-bottom: 24px;
            font-weight: 400;
        }
        .selectRole {
            display: flex;
            width: 100%;
            gap: 12px;
            margin: 0 0 24px 0;
        }

        .form-label {
            font-weight: 700;
            font-size: 0.95rem;
            color: #374151;
            margin-bottom: 8px;
        }

        .input-group {
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid rgba(209,213,219,0.80);
            background: rgba(255,255,255,0.92);
        }

        .form-control,
        .input-group-text {
            height: 52px;
            border: none !important;
            font-size: 0.95rem;
            background: transparent;
        }

        .input-group-text {
            padding: 0 18px;
            color: #9ca3af;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-control {
            padding-left: 6px;
            color: #111827;
            box-shadow: none !important;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #2563eb;
        }

        input::placeholder {
            color: rgba(107, 114, 128, 0.55) !important;
            opacity: 1;
        }

        .login-btn {
            width: 100%;
            height: 54px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(90deg, #2563eb, #1d4ed8);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            margin-top: 4px;
            transition: 0.2s ease;
            box-shadow: 0 6px 18px rgba(37,99,235,0.18);
        }

        .login-btn:hover {
            transform: translateY(-1px);
            opacity: 0.95;
        }

        .divider {
            display: flex;
            justify-content: center;
            /* align-items: center; */
            gap: 8px;
            margin: 10px 0;
            color: #6b7280;
            font-weight: 500;
            font-size: 0.90rem;
        }

        .mode-btn {
            width: 100%;
            height: 48px;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 700;
            border: 2px solid #2563eb;
            background: rgba(255,255,255,0.90);
            color: #2563eb;
            transition: 0.2s ease;
            margin-top: 0;
        }

        .mode-btn:hover {
            background: #eff6ff;
        }
        .active-mode {
            background: linear-gradient(90deg, #2563eb, #1d4ed8) !important;
            color: white !important;
            border-color: #2563eb !important;
        }

        .top-mode-switch {
            display: flex;
        }

        .footer-text {
            text-align: center;
            margin-top: 14px;
            color: #6b7280;
            font-size: 0.82rem;
        }

        @media (max-width: 768px) {
            .login-card {
                max-width: 100%;
                padding: 28px 22px;
                border-radius: 22px;
            }

            .login-title {
                font-size: 1.9rem;
            }

            .top-mode-switch {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card shadow">
            <div class="logo-icon">🏊</div>
            <h1 class="login-title">Learn Swimming</h1>
            <p class="login-subtitle">Fear less. Swim more.</p>
            <div class="selectRole">
                <button type="button"
                        id="guestBtn"
                        class="btn btn-outline-primary flex-fill mode-btn active-mode">
                    Guest
                </button>
                <button type="button"
                        id="trainerBtn"
                        class="btn btn-outline-success flex-fill mode-btn">
                    Trainer
                </button>
            </div>
            <form action="/login" method="post" id="loginForm">
                <input type="hidden" name="role" id="roleInput" value="guest">


                <div class="mb-4 mt-2">
                    <label class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text">👤</span>
                        <input
                            type="text"
                            name="name"
                            id="nameInput"
                            class="form-control"
                            placeholder="Enter username"
                            maxlength="50"
                            required
                        >
                    </div>
                    <small id="nameError" class="text-danger d-none">
                        Please enter a valid username
                    </small>
                </div>

                <div class="mb-4 d-none" id="passwordField">
                    <label class="form-label">Mobile Number</label>

                    <div class="input-group">
                        <span class="input-group-text">📞</span>

                        <input
                            type="tel"
                            name="password"
                            id="passwordInput"
                            class="form-control"
                            placeholder="Enter mobile number"
                        >
<!-- 
                        <span class="input-group-text">👁️</span> -->
                    </div>
                </div>

                <div class="mb-4" id="phoneField">
                    <label class="form-label">Mobile Number</label>

                    <div class="input-group">
                        <span class="input-group-text">📞</span>

                        <input
                            type="tel"
                            id="phoneInput"
                            name="phone"
                            class="form-control"
                            placeholder="Enter mobile number"
                            maxlength="10"
                            pattern="[0-9]{10}"
                            inputmode="numeric"
                            required
                        >

                        <!-- <span class="input-group-text">👁️</span> -->
                    </div>

                    <small id="phoneError" class="text-danger d-none">
                        Please enter valid 10-digit mobile number
                    </small>
                    {% with messages = get_flashed_messages() %}
                        {% if messages %}
                            <small class="text-danger d-block mt-1" style="font-size: 0.78rem;">
                                ⚠️ {{ messages[-1] }}
                            </small>
                        {% endif %}
                    {% endwith %}
                </div>

                <button type="submit" class="login-btn">
                    <span
                        class="spinner-border spinner-border-sm me-2 d-none"
                        role="status"
                        aria-hidden="true">
                    </span>
                    <span>Login as Guest</span>
                </button>

                <div class="footer-text">
                    © 2026 Swimming Summer Camp. All rights reserved.
                </div>
            </form>
        </div>
    </div>
<script>
    const phoneInput = document.getElementById('phoneInput');
    const phoneError = document.getElementById('phoneError');
    const loginForm = document.getElementById('loginForm');
    const guestBtn = document.getElementById('guestBtn');
    const trainerBtn = document.getElementById('trainerBtn');
    const roleInput = document.getElementById('roleInput');
    const phoneField = document.getElementById('phoneField');
    const passwordField = document.getElementById('passwordField');
    const passwordInput = document.getElementById('passwordInput');
    const nameInput = document.getElementById('nameInput');
    const nameError = document.getElementById('nameError');

    function activateTrainerMode() {
        roleInput.value = 'trainer';

        trainerBtn.classList.add('active-mode');
        if (guestBtn) {
            guestBtn.classList.remove('active-mode');
        }

        phoneField.classList.add('d-none');
        passwordField.classList.remove('d-none');

        phoneInput.required = false;
        passwordInput.required = true;

        const loginButtonLabel = document.querySelector('.login-btn span:last-child');
        if (loginButtonLabel) {
            loginButtonLabel.textContent = 'Login as Trainer';
        }
    }


    function activateGuestMode() {
        roleInput.value = 'guest';

        if (guestBtn) {
            guestBtn.classList.add('active-mode');
        }

        if (trainerBtn) {
            trainerBtn.classList.remove('active-mode');
        }

        phoneField.classList.remove('d-none');
        passwordField.classList.add('d-none');

        phoneInput.required = true;
        passwordInput.required = false;

        const loginButtonLabel = document.querySelector('.login-btn span:last-child');
        if (loginButtonLabel) {
            loginButtonLabel.textContent = 'Login as Guest';
        }
    }

    if (trainerBtn) {
        trainerBtn.addEventListener('click', activateTrainerMode);
    }

    if (guestBtn) {
        guestBtn.addEventListener('click', activateGuestMode);
    }

    if (phoneInput) {
    phoneInput.addEventListener('input', () => {
        phoneInput.value = phoneInput.value.replace(/\D/g, '').slice(0, 10);

        if (phoneInput.value.length === 10) {
            phoneError.classList.add('d-none');
            phoneInput.classList.remove('is-invalid');
        }
    });
}

if (loginForm) {
    loginForm.addEventListener('submit', (e) => {
        // Reset previous validation messages
        if (phoneError) {
            phoneError.classList.add('d-none');
        }

        if (nameError) {
            nameError.classList.add('d-none');
        }

        if (phoneInput) {
            phoneInput.classList.remove('is-invalid');
        }

        if (nameInput) {
            nameInput.classList.remove('is-invalid');
        }

        // Normalize username (trim spaces)
        if (nameInput) {
            nameInput.value = nameInput.value.trim();
        }

        // Username validation
        if (!nameInput || nameInput.value.length === 0) {
            e.preventDefault();

            if (nameError) {
                nameError.textContent = 'Please enter a valid username';
                nameError.classList.remove('d-none');
            }

            if (nameInput) {
                nameInput.classList.add('is-invalid');
            }

            return;
        }

        if (roleInput.value === 'guest') {
            const phone = phoneInput.value.trim();

            // Normalize phone number to digits only
            phoneInput.value = phone.replace(/\D/g, '');

            if (!/^\d{10}$/.test(phoneInput.value)) {
                e.preventDefault();

                if (phoneError) {
                    phoneError.textContent =
                        'Please enter a valid 10-digit mobile number';
                    phoneError.classList.remove('d-none');
                }

                phoneInput.classList.add('is-invalid');
                return;
            }
        }
    });
}
// V0038.0 - Mobile Pull To Refresh (Login Page Only)
let pullStartY = 0;
let pullCurrentY = 0;
const PULL_REFRESH_THRESHOLD = 80;

window.addEventListener('touchstart', (e) => {
    if (window.scrollY === 0) {
        pullStartY = e.touches[0].clientY;
    }
}, { passive: true });

window.addEventListener('touchmove', (e) => {
    if (window.scrollY === 0) {
        pullCurrentY = e.touches[0].clientY;
    }
}, { passive: true });

window.addEventListener('touchend', () => {
    const pullDistance = pullCurrentY - pullStartY;

    if (window.scrollY === 0 && pullDistance > PULL_REFRESH_THRESHOLD) {
        window.location.reload();
    }

    pullStartY = 0;
    pullCurrentY = 0;
});
</script>
</body>
<script src="{{ url_for('static', filename='login.js') }}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</html>

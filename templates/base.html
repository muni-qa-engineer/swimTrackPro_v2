

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SwimTrackPro{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='common.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>

{% block content %}
{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
if (window.self !== window.top) {
    console.log("Embedded inside iframe! Path:", window.location.pathname);
    // Inject style cleanly without document.write to avoid page wipeout issues
    const style = document.createElement('style');
    style.textContent = '.app-page-header, .mobile-bottom-nav { display: none !important; } body { padding-top: 0 !important; margin-top: 0 !important; }';
    document.documentElement.appendChild(style);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Booking</title>
</head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f7fb;
        }

        .edit-card {
            border: none;
            border-radius: 18px;
            overflow: hidden;
        }

        .edit-header {
            background: linear-gradient(135deg, #0d6efd, #0b5ed7);
            padding: 18px 24px;
        }

        .form-control,
        .form-select {
            border-radius: 12px;
            padding: 12px;
        }

        .form-label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #374151;
        }

        .btn {
            border-radius: 10px;
            padding: 10px 18px;
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="card shadow-lg edit-card">
        <div class="card-header edit-header text-white d-flex justify-content-between align-items-center">
            <a href="/" class="btn btn-light btn-sm px-3">← Back</a>
            <h4 class="mb-0">Edit Booking</h4>
        </div>

        <div class="card-body p-4">
            <form action="/update/{{ booking.id }}" method="POST">

                <div class="mb-3">
                    <label class="form-label">Swimmer Name</label>
                    <input type="text" name="student" class="form-control" value="{{ booking.student }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Date</label>
                    <input type="date" name="date" class="form-control" value="{{ booking.start_date }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Package</label>

                    <select name="package" id="packageSelect" class="form-select">
                        <option value="Single" {% if booking.package == 'Single' %}selected{% endif %}>Single</option>
                        <option value="Monthly" {% if booking.package == 'Monthly' %}selected{% endif %}>Monthly</option>
                        <option value="Custom" {% if booking.package == 'Custom' %}selected{% endif %}>Custom</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Time</label>
                    <select name="time" class="form-select">
                        {% for hour in range(6, 22) %}
                            {% for minute in [0, 30] %}
                                {% if not (hour == 21 and minute == 30) %}
                                    {% set display_hour = hour % 12 if hour % 12 != 0 else 12 %}
                                    {% set ampm = 'PM' if hour >= 12 else 'AM' %}
                                    {% set formatted = '%02d:%02d %s' % (display_hour, minute, ampm) %}

                                    <option value="{{ formatted }}"
                                        {% if booking.time == formatted %}selected{% endif %}>
                                        {{ formatted }}
                                    </option>
                                {% endif %}
                            {% endfor %}
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label">Select Class Days</label>

                    {% set selected_days_text = booking.selected_days or '' %}

                    <div class="d-flex flex-wrap gap-3 mt-2">

                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="selected_days" value="Mon"
                                {% if 'Mon' in selected_days_text %}checked{% endif %}>
                            <label class="form-check-label">Mon</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="selected_days" value="Tue"
                                {% if 'Tue' in selected_days_text %}checked{% endif %}>
                            <label class="form-check-label">Tue</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="selected_days" value="Wed"
                                {% if 'Wed' in selected_days_text %}checked{% endif %}>
                            <label class="form-check-label">Wed</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="selected_days" value="Thu"
                                {% if 'Thu' in selected_days_text %}checked{% endif %}>
                            <label class="form-check-label">Thu</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="selected_days" value="Fri"
                                {% if 'Fri' in selected_days_text %}checked{% endif %}>
                            <label class="form-check-label">Fri</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="selected_days" value="Sat"
                                {% if 'Sat' in selected_days_text %}checked{% endif %}>
                            <label class="form-check-label">Sat</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="selected_days" value="Sun"
                                {% if 'Sun' in selected_days_text %}checked{% endif %}>
                            <label class="form-check-label">Sun</label>
                        </div>

                    </div>
                </div>

                <div class="mb-3" id="endDateContainer">
                    <label class="form-label">End Date</label>
                    <input type="date" name="end_date" class="form-control" value="{{ booking.end_date or '' }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Location</label>
                    <input
                        type="text"
                        name="location"
                        class="form-control"
                        value="{{ booking.location or '' }}"
                        placeholder="Enter swimming pool location"
                    >
                </div>

                <div class="row">

                    <div class="col-md-4 mb-3">
                        <label class="form-label">No of Persons</label>

                        <input
                            type="number"
                            name="persons"
                            id="personsInput"
                            class="form-control"
                            min="1"
                            value="{{ booking.persons or 1 }}"
                        >
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Payment Status</label>

                        <select name="payment_status" class="form-select">
                            <option value="Not Paid" {% if booking.status == 'Not Paid' %}selected{% endif %}>Not Paid</option>
                            <option value="Paid" {% if booking.status == 'Paid' %}selected{% endif %}>Paid</option>
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Fee</label>

                        <input
                            type="number"
                            name="fee"
                            id="feeInput"
                            class="form-control"
                            value="{{ booking.fee }}"
                        >

                        <div class="form-text">
                            Fee is calculated automatically based on package and number of persons.
                        </div>
                    </div>

                </div>

                <div class="d-flex justify-content-between">
                    <a href="/" class="btn btn-outline-secondary px-4">Cancel</a>
                    <button type="submit" class="btn btn-success px-4">Update Booking</button>
                </div>

            </form>
        </div>
    </div>
</div>

<script>
const pkg = document.getElementById('packageSelect');
const endDateContainer = document.getElementById('endDateContainer');
const startDateInput = document.querySelector('input[name="date"]');
const endDateInput = document.querySelector('input[name="end_date"]');
const dayCheckboxes = document.querySelectorAll('input[name="selected_days"]');
const personsInput = document.getElementById('personsInput');
const feeInput = document.getElementById('feeInput');

function updateEditBookingRules() {

    if (!pkg || !startDateInput) return;

    const selectedDate = new Date(startDateInput.value);

    const days = [
        'Sunday',
        'Monday',
        'Tuesday',
        'Wednesday',
        'Thursday',
        'Friday',
        'Saturday'
    ];

    const allowedDay = days[selectedDate.getDay()];

    // SINGLE PACKAGE
    if (pkg.value === 'Single') {

        // Automatically select the weekday that matches the chosen start date.
        const weekdayMap = {
            'Sunday': 'Sun',
            'Monday': 'Mon',
            'Tuesday': 'Tue',
            'Wednesday': 'Wed',
            'Thursday': 'Thu',
            'Friday': 'Fri',
            'Saturday': 'Sat'
        };

        const selectedDayValue = weekdayMap[allowedDay];

        dayCheckboxes.forEach(cb => {
            cb.checked = false;

            if (cb.value === selectedDayValue) {
                cb.disabled = false;
                cb.checked = true;
            } else {
                cb.disabled = true;
            }
        });

        if (endDateContainer) {
            endDateContainer.style.display = 'none';
        }
        if (endDateInput) {
            endDateInput.value = startDateInput.value;
        }
        if (endDateInput) {
            endDateInput.readOnly = true;
        }
    }

    // MONTHLY + CUSTOM
    else {

        dayCheckboxes.forEach(cb => {
            cb.disabled = false;
        });

        if (endDateContainer) {
            endDateContainer.style.display = 'block';
        }
        if (endDateInput) {
            endDateInput.readOnly = (pkg.value === 'Monthly');
        }

        // MONTHLY AUTO END DATE
        if (pkg.value === 'Monthly') {

            const autoEndDate = new Date(selectedDate);

            autoEndDate.setMonth(autoEndDate.getMonth() + 1);
            autoEndDate.setDate(autoEndDate.getDate() - 1);

            const yyyy = autoEndDate.getFullYear();
            const mm = String(autoEndDate.getMonth() + 1).padStart(2, '0');
            const dd = String(autoEndDate.getDate()).padStart(2, '0');

            if (endDateInput) {
                endDateInput.value = `${yyyy}-${mm}-${dd}`;
                endDateInput.readOnly = true;
            }
        }
        if (pkg.value === 'Custom' && endDateInput) {
            endDateInput.readOnly = false;
        }
    }
    updateEditBookingFee();
}

function updateEditBookingFee() {

    if (!feeInput) return;

    const persons = Math.max(parseInt(personsInput?.value || '1', 10), 1);
    let baseFee = 0;

    if (pkg.value === 'Single') {
        baseFee = 750;
    }
    else if (pkg.value === 'Monthly') {
        baseFee = 9000;
    }
    else {
        // Custom package currently uses the same base as Monthly.
        baseFee = 9000;
    }

    let discount = 0;

    if (persons === 2) {
        discount = 10;
    }
    else if (persons === 3) {
        discount = 20;
    }
    else if (persons === 4) {
        discount = 25;
    }
    else if (persons >= 5) {
        discount = 30;
    }

    // Calculate total fee for all persons, then apply the group discount.
    const totalFee = baseFee * persons;
    const finalFee = Math.round(totalFee * (100 - discount) / 100);
    feeInput.value = finalFee;
}

function validateSelectedDaysLimit() {

    const checked = [...dayCheckboxes].filter(cb => cb.checked);

    // MONTHLY => max 3 days
    if (pkg.value === 'Monthly' && checked.length > 3) {

        alert('Monthly package allows maximum 3 class days');

        checked[checked.length - 1].checked = false;
    }
}

if (pkg) {
    pkg.addEventListener('change', updateEditBookingRules);
}

if (startDateInput) {
    startDateInput.addEventListener('change', updateEditBookingRules);
}
if (endDateInput) {
    endDateInput.addEventListener('change', updateEditBookingFee);
}

if (personsInput) {
    personsInput.addEventListener('input', updateEditBookingFee);
}

if (dayCheckboxes.length > 0) {
    dayCheckboxes.forEach(cb => {
        cb.addEventListener('change', validateSelectedDaysLimit);
        cb.addEventListener('change', updateEditBookingFee);
    });
}

updateEditBookingRules();
updateEditBookingFee();
</script>

</body>
</html>
